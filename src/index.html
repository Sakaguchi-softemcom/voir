<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voir</title>

  <!-- GitHub Markdown CSS (official) -->
  <link rel="stylesheet" href="styles/github-markdown-light.css" id="gfm-light" />
  <link rel="stylesheet" href="styles/github-markdown-dark.css" id="gfm-dark" disabled />
  <link rel="stylesheet" href="styles/github-markdown-overrides.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/print.css" />

  <!-- Vendor (local, offline) -->
  <link rel="stylesheet" href="vendor/highlight/github.css" id="hljs-light" />
  <link rel="stylesheet" href="vendor/highlight/github-dark.css" id="hljs-dark" disabled />
  <script src="vendor/highlight/highlight.min.js"></script>
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/mermaid/mermaid.min.js"></script>
</head>
<body>
  <!-- ═══ Toolbar ═══ -->
  <header id="titlebar">
    <div class="titlebar-left">
      <button id="btn-sidebar-toggle" class="titlebar-btn" data-i18n-title="toolbar.explorer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h18"/></svg>
      </button>
      <button id="btn-open" class="titlebar-btn" data-i18n-title="toolbar.open">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5z"/></svg>
      </button>
      <button id="btn-back" class="titlebar-btn" data-i18n-title="toolbar.back" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <button id="btn-forward" class="titlebar-btn" data-i18n-title="toolbar.forward" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="titlebar-center"><div id="tab-bar"></div></div>
    <div class="titlebar-right">
      <button id="btn-search" class="titlebar-btn" data-i18n-title="toolbar.search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>
      <button id="btn-toc-toggle" class="titlebar-btn" data-i18n-title="toolbar.toc">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h10M4 18h12"/></svg>
      </button>
      <button id="btn-theme" class="titlebar-btn" data-i18n-title="toolbar.theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sun"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-moon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </button>
      <button id="btn-print" class="titlebar-btn" data-i18n-title="toolbar.print">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </button>
      <button id="btn-settings" class="titlebar-btn" data-i18n-title="toolbar.settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ Main Layout ═══ -->
  <div id="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="hidden">
      <div class="sidebar-header">
        <h3 data-i18n="sidebar.explorer">エクスプローラ</h3>
        <div class="sidebar-header-actions">
          <button id="btn-explorer-back" class="sidebar-nav-btn" title="Back" disabled>◀</button>
          <button id="btn-explorer-forward" class="sidebar-nav-btn" title="Forward" disabled>▶</button>
          <button id="btn-sidebar-close" class="sidebar-close-btn">&times;</button>
        </div>
      </div>
      <!-- Project Root -->
      <div id="project-root-section" class="sidebar-section hidden">
        <div class="sidebar-section-header" style="display:flex;justify-content:space-between;align-items:center">
          <span data-i18n="sidebar.projectRoot">プロジェクトルート</span>
          <button id="btn-change-root" class="sidebar-nav-btn" data-i18n-title="sidebar.changeRoot" style="font-size:11px">📁</button>
        </div>
        <div id="project-root-label" class="project-root-label"></div>
      </div>
      <!-- Bookmarks -->
      <div id="bookmarks-section" class="sidebar-section hidden">
        <div class="sidebar-section-header"><span data-i18n="sidebar.bookmarks">ブックマーク</span></div>
        <div id="bookmarks-list"></div>
      </div>
      <div id="file-tree"></div>
    </aside>

    <!-- Main Content -->
    <main id="content-area">
      <div id="welcome-screen">
        <div class="welcome-inner">
          <h1 class="welcome-logo">Voir</h1>
          <p class="welcome-tagline" data-i18n="welcome.tagline">Markdown Viewer For Windows</p>
          <div class="welcome-actions">
            <button id="btn-welcome-open" class="welcome-btn" data-i18n="welcome.openFile">ファイルを開く</button>
            <button id="btn-welcome-folder" class="welcome-btn" data-i18n="welcome.openFolder">フォルダを開く</button>
          </div>
          <div id="recent-files" class="welcome-recent"></div>
        </div>
      </div>
      <div id="markdown-view" class="hidden">
        <article id="markdown-body" class="markdown-body"></article>
      </div>
    </main>

    <!-- TOC Panel -->
    <aside id="toc-panel" class="hidden">
      <div class="sidebar-header">
        <h3 data-i18n="sidebar.contents">目次</h3>
        <button id="btn-toc-close" class="sidebar-close-btn">&times;</button>
      </div>
      <nav id="toc-list"></nav>
    </aside>
  </div>

  <!-- Search -->
  <div id="search-overlay" class="hidden">
    <div class="search-bar">
      <input type="text" id="search-input" data-i18n-placeholder="search.placeholder" placeholder="ドキュメント内を検索..." autocomplete="off" />
      <label class="search-option"><input type="checkbox" id="search-case" /> Aa</label>
      <span id="search-count"></span>
      <button id="search-prev" class="search-nav-btn">▲</button>
      <button id="search-next" class="search-nav-btn">▼</button>
      <button id="search-pin" class="search-nav-btn" data-i18n-title="search.pinTooltip">📌</button>
      <button id="search-close" class="search-nav-btn">&times;</button>
    </div>
  </div>

  <!-- Project Search Panel -->
  <div id="project-search-panel" class="hidden">
    <div class="psearch-backdrop"></div>
    <div class="psearch-dialog">
      <div class="psearch-header">
        <h3 data-i18n="psearch.title">プロジェクト検索</h3>
        <button id="psearch-close" class="sidebar-close-btn">&times;</button>
      </div>
      <div class="psearch-input-row">
        <input type="text" id="psearch-input" data-i18n-placeholder="psearch.placeholder" placeholder="プロジェクト内を検索..." autocomplete="off" />
        <label class="search-option"><input type="checkbox" id="psearch-case" /> Aa</label>
      </div>
      <div id="psearch-status" class="psearch-status"></div>
      <div id="psearch-no-root" class="psearch-no-root hidden"></div>
      <div id="psearch-results" class="psearch-results"></div>
    </div>
  </div>

  <!-- Viewer Modal -->
  <div id="viewer-modal" class="hidden">
    <div class="viewer-backdrop"></div>
    <div class="viewer-container">
      <div class="viewer-toolbar">
        <span id="viewer-title"></span>
        <div class="viewer-toolbar-actions">
          <button id="viewer-copy" class="viewer-btn" data-i18n="viewer.copy">コピー</button>
          <button id="viewer-save" class="viewer-btn" data-i18n="viewer.save">保存</button>
          <button id="viewer-zoom-in" class="viewer-btn">+</button>
          <button id="viewer-zoom-out" class="viewer-btn">−</button>
          <button id="viewer-zoom-reset" class="viewer-btn" data-i18n="viewer.reset">リセット</button>
          <button id="viewer-close" class="viewer-btn viewer-close-btn">&times;</button>
        </div>
      </div>
      <div id="viewer-content" class="viewer-content"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden"><div id="context-menu-items"></div></div>

  <!-- Settings -->
  <div id="settings-panel" class="hidden">
    <div class="settings-backdrop"></div>
    <div class="settings-dialog">
      <div class="settings-header">
        <h2 data-i18n="settings.title">設定</h2>
        <button id="settings-close" class="sidebar-close-btn">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-group">
          <label data-i18n="settings.language">言語 / Language</label>
          <select id="setting-language">
            <option value="ja">日本語</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="settings-group">
          <label data-i18n="settings.theme">テーマ</label>
          <select id="setting-theme">
            <option value="auto">自動（OS連動）</option>
            <option value="light">GitHub Light</option>
            <option value="dark">GitHub Dark</option>
            <option value="github-dimmed">GitHub Dark Dimmed</option>
            <option value="one-light">One Light</option>
            <option value="solarized-light">Solarized Light</option>
            <option value="solarized-dark">Solarized Dark</option>
            <option value="gruvbox-light">Gruvbox Light</option>
            <option value="dracula">Dracula</option>
            <option value="nord">Nord</option>
            <option value="tokyo-night">Tokyo Night</option>
            <option value="tokyo-night-light">Tokyo Night Light</option>
            <option value="catppuccin">Catppuccin Mocha</option>
            <option value="catppuccin-latte">Catppuccin Latte</option>
          </select>
        </div>
        <div class="settings-group">
          <label data-i18n="settings.fontSize">フォントサイズ</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="range" id="setting-fontsize" min="12" max="24" value="16" />
            <span id="setting-fontsize-label">16px</span>
          </div>
        </div>
        <div class="settings-group">
          <label data-i18n="settings.sidebarOnStart">起動時にサイドバー表示</label>
          <input type="checkbox" id="setting-sidebar" />
        </div>
        <div class="settings-group">
          <label data-i18n="settings.tocOnStart">起動時に目次表示</label>
          <input type="checkbox" id="setting-toc" />
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts (i18n must load before app.js) -->
  <script src="scripts/i18n.js"></script>
  <script src="scripts/tabs.js"></script>
  <script src="scripts/explorer.js"></script>
  <script src="scripts/toc.js"></script>
  <script src="scripts/search.js"></script>
  <script src="scripts/viewer.js"></script>
  <script src="scripts/context-menu.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
